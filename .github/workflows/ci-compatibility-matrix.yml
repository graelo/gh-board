# Test pre-releases on a larger scope (platforms & versions) to avoid bad surprises.
# Opt-in via push to a `compat/*` branch (e.g., `compat/0.17-prerelease`).

name: 'CI: Compatibility Matrix'
on:
  push:
    branches:
      - 'compat/*'

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  test-all-versions:
    name: ubuntu-latest (${{ matrix.rust }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        rust: [1.95.0, beta, nightly]

    steps:
      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Cache crates
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        continue-on-error: false
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ matrix.rust }}-hash-${{ hashFiles('**/Cargo.lock') }}

      - name: Quality – cargo fmt
        run: |
          cargo fmt --all -- --check

      - name: Quality – cargo clippy
        run: |
          cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Build (dev)
        run: cargo build --locked --all-features

      - name: Build (release)
        run: cargo build --locked --all-features --release

      - name: Install cargo-nextest
        uses: taiki-e/install-action@7769b73c2ec98c38dfcf2e18c83cfd4880c038c1 # v2.75.27
        with:
          tool: cargo-nextest@0.9.133

      - name: Test
        run: ./ci/test_full.sh

  test-all-platforms:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15-intel
            target: x86_64-apple-darwin
            toolchain: stable
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            toolchain: stable
          - os: macos-latest
            target: aarch64-apple-darwin
            toolchain: stable
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            toolchain: stable
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            toolchain: stable
    steps:
      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: ${{ matrix.toolchain }}
          targets: ${{ matrix.target }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Cache crates
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        continue-on-error: false
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-stable-${{ hashFiles('**/Cargo.lock') }}

      - name: Build (dev)
        run: cargo build --locked --all-features

      - name: Build (release)
        run: cargo build --locked --all-features --release

      - name: Install cargo-nextest
        uses: taiki-e/install-action@7769b73c2ec98c38dfcf2e18c83cfd4880c038c1 # v2.75.27
        with:
          tool: cargo-nextest@0.9.133

      - name: Test
        run: ./ci/test_full.sh
